<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <link rel="stylesheet" href="/css/main.css" />
    <script src="/js/main.js"></script>
    <title>Dot — Tasks</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
      }
      body {
        display: flex;
      }
      .main {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      .tasks-area {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .add-bar {
        flex-shrink: 0;
      }
      .sidebar {
        display: flex;
        flex-direction: column;
      }
      .nav-section {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
      }
      .sidebar-footer {
        flex-shrink: 0;
      }
    </style>
  </head>
  <body>
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="avatar" id="avatar">?</div>
        <div class="user-info">
          <div class="user-name" id="user-name">…</div>
          <div class="user-email" id="user-email"></div>
        </div>
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search tasks…" />
        </div>
      </div>

      <nav class="nav-section">
        <div class="nav-item" data-filter="all">
          <span class="nav-icon">📋</span>
          <span class="nav-label">All tasks</span>
          <span class="nav-count" id="count-all">0</span>
        </div>
        <div class="nav-item" data-filter="pending">
          <span class="nav-icon">⏳</span>
          <span class="nav-label">Pending</span>
          <span class="nav-count" id="count-pending">0</span>
        </div>
        <div class="nav-divider"></div>
        <div class="nav-item" data-filter="done">
          <span class="nav-icon">✅</span>
          <span class="nav-label">Completed</span>
          <span class="nav-count" id="count-done">0</span>
        </div>
      </nav>

      <div class="sidebar-footer">
        <button class="btn-logout" id="btn-logout">
          <span>🚪</span> Log out
        </button>
      </div>
    </aside>

    <div class="main">
      <div class="main-header">
        <button class="menu-toggle" id="menu-toggle">☰</button>
        <div class="header-icon">📋</div>
        <span class="header-title" id="header-title">All tasks</span>
        <div class="header-actions"></div>
      </div>

      <div class="tasks-area" id="tasks-list"></div>

      <div class="add-bar">
        <input
          type="text"
          id="new-task-input"
          placeholder="Add a new task… (press Enter)"
        />
        <button class="add-plus" id="btn-add" title="Add task">+</button>
      </div>
    </div>

    <div class="modal-overlay" id="modal-overlay">
      <div class="modal">
        <h2>Edit task</h2>
        <input type="hidden" id="edit-id" />
        <div class="modal-field">
          <label>Title</label>
          <input type="text" id="edit-title" placeholder="Task title" />
        </div>
        <div class="modal-field">
          <label>Due date</label>
          <input type="date" id="edit-due" />
        </div>
        <div class="modal-field">
          <label>Notes</label>
          <textarea id="edit-desc" placeholder="Optional notes…"></textarea>
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" id="btn-cancel">Cancel</button>
          <button class="btn-save" id="btn-save">Save changes</button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
      function fixHeight() {
        var h = window.visualViewport
          ? window.visualViewport.height
          : window.innerHeight;
        document.documentElement.style.setProperty("--real-vh", h + "px");
        document.body.style.height = h + "px";
        document.querySelector(".sidebar").style.height = h + "px";
        document.querySelector(".main").style.height = h + "px";
      }
      fixHeight();
      window.addEventListener("resize", fixHeight);
      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", fixHeight);
      }
    </script>
  </body>
</html>
